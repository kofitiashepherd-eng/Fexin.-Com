</html><style>
    :root {
        --neon-pink: #ff0050;
        --neon-blue: #00f2ea;
        --glass: rgba(255, 255, 255, 0.1);
    }

    body {
        margin: 0; background: #000; color: white;
        font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column;
    }

    /* --- HD VIDEO CONTAINER --- */
    .video-card {
        height: 100vh; width: 100vw; position: relative;
        scroll-snap-align: start; overflow: hidden;
    }

    video {
        width: 100%; height: 100%; object-fit: cover;
    }

    /* --- SIDEBAR ACTIONS --- */
    .right-sidebar {
        position: absolute; right: 10px; bottom: 120px;
        display: flex; flex-direction: column; align-items: center; gap: 15px;
    }

    .action-group { text-align: center; font-size: 12px; font-weight: bold; }

    .btn-circle {
        width: 50px; height: 50px; border-radius: 50%;
        background: var(--glass); backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.2);
        color: white; font-size: 22px; display: flex;
        align-items: center; justify-content: center;
        box-shadow: 0 0 15px rgba(0, 242, 234, 0.3);
    }

    /* --- USER INFO OVERLAY --- */
    .video-info {
        position: absolute; bottom: 100px; left: 15px; width: 70%;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    }

    .username { font-weight: 800; font-size: 1.1rem; margin-bottom: 5px; color: var(--neon-blue); }
    .region-tag { 
        background: var(--neon-pink); padding: 2px 8px; 
        border-radius: 4px; font-size: 10px; text-transform: uppercase;
    }

    /* --- DOUBLE TAP HEART ANIMATION --- */
    .heart-pop {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%) scale(0);
        color: var(--neon-pink); font-size: 80px;
        pointer-events: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .heart-pop.active { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }

    /* --- HD PROGRESS BAR --- */
    .progress-container {
        position: absolute; bottom: 85px; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.1);
    }
    .progress-bar { height: 100%; background: var(--neon-blue); width: 0%; box-shadow: 0 0 10px var(--neon-blue); }

</style>

<div id="main-feed">
    <div class="video-card" ondblclick="animateHeart(this)">

</div>

<script>
    // Double Tap Heart Logic
    function animateHeart(card) {
        const heart = card.querySelector('.heart-pop');
        heart.classList.add('active');
        setTimeout(() => {
            heart.classList.remove('active');
        }, 800);
        
        // Trigger the like logic automatically
        const likeBtn = card.querySelector('.btn-circle');
        likeBtn.style.color = 'var(--neon-pink)';
    }

    // HD Progress Bar Logic
    function updateProgress(video) {
        const bar = video.parentElement.querySelector('.progress-bar');
        const percentage = (video.currentTime / video.duration) * 100;
        bar.style.width = percentage + "%";
    }

    // Share API (Triggers native phone sharing)
    async function shareVideo() {
        try {
            await navigator.share({
                title: 'Fexin Video',
                text: 'Check out this cool video on Fexin!',
                url: window.location.href,
            });
        } catch (err) {
            alert("Link copied!");
        }
    }
</script>
<nav>
    <button onclick="showSection('home')">🏠 Home</button>

<script>
    function showSection(section) {
        // Find our three main screens
        const home = document.getElementById('main-feed');
        const chat = document.getElementById('chat-section');
        const profile = document.getElementById('profile-section');

        // Hide them all
        if (home) home.style.display = 'none';
        if (chat) chat.style.display = 'none';
        if (profile) profile.style.display = 'none';

        // Show the one we want
        if (section === 'home' && home) home.style.display = 'block';
        if (section === 'chat' && chat) chat.style.display = 'block';
        if (section === 'profile' && profile) profile.style.display = 'block';
    }
</script>
<script>
    // Cache the elements once at the start
    const sections = {
        home: document.getElementById('main-feed'),
        chat: document.getElementById('chat-section'),
        profile: document.getElementById('profile-section')
    };

    function showSection(sectionName) {
        // Hide all sections using a loop
        Object.values(sections).forEach(section => {
            if (section) section.style.display = 'none';
        });

        // Show the target section
        if (sections[sectionName]) {
            sections[sectionName].style.display = 'block';
        }
    }
</script>
